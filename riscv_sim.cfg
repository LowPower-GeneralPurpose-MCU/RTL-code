adapter driver remote_bitbang
remote_bitbang host localhost
remote_bitbang port 12345

transport select jtag

jtag newtap my_chip cpu -irlen 5 -expected-id 0x10e31913

set _TARGETNAME my_chip.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Cấu hình thanh ghi JTAG chuẩn
riscv set_ir idcode 0x01
riscv set_ir dtmcs  0x10
riscv set_ir dmi    0x11

# Ép sử dụng SBA (System Bus Access) để đọc ghi RAM thay vì Abstract Command (GPR)
riscv set_enable_virtual off
$_TARGETNAME configure -work-area-size 0

# --- BỔ SUNG: Ép danh sách CSR cụ thể để tránh GDB bị ngợp ---
# 768-815 (0x300-0x32F): Nhóm Machine Status (mstatus, misa, mie, mtvec...)
# 832-840 (0x340-0x348): Nhóm Machine Exception (mscratch, mepc, mcause...)
# 1968-1970 (0x7B0-0x7B2): Nhóm Debug (dcsr, dpc, dscratch0)
# 2816, 2818 (0xB00, 0xB02): mcycle, minstret
riscv expose_csrs 768-815,832-840,1968-1970,2816,2818

init
# Disable polling liên tục để tránh lỗi ngập log khi CPU chưa support full HALT mode
poll off